const SAMPLES = [
  { id:"s1", title:"العملاء المهتمين جداً دون تواصل منذ 3 أيام", crmUrl:"https://app.hubspot.com/contacts/sample-1",
    description:"يظهر هذا الفلتر جميع العملاء المحتملين المصنفين كـ 'مهتم جداً' والذين لم يتم إرسال إيميل أو إجراء مكالمة معهم في آخر 3 أيام لسرعة المتابعة.",
    imageUrl:DEF_IMAGE, createdBy:"النظام", createdAt:new Date().toISOString() },
  { id:"s2", title:"صفقات مفتوحة منذ أكثر من 30 يوماً بدون نشاط", crmUrl:"https://app.hubspot.com/contacts/sample-2",
    description:"قائمة بجميع الصفقات المفتوحة التي لم يتم تسجيل أي نشاط عليها منذ أكثر من 30 يوماً، لمتابعتها وإعادة تنشيطها.",
    imageUrl:DEF_IMAGE, createdBy:"النظام", createdAt:new Date().toISOString() },
];

/* ── Login ── */
function LoginScreen({ onLogin, lang, setLang }) {
  const [pw,setPw]=useState(""); const [err,setErr]=useState(false); const t=T[lang];
  const submit = e => { e.preventDefault(); if(pw===PASSWORD) onLogin(); else { setErr(true); setTimeout(()=>setErr(false),2000); } };
  return (
    <div className="min-h-screen bg-gradient-to-br from-orange-500 via-red-500 to-orange-700 flex items-center justify-center p-4" dir={t.dir}>
      <div className="absolute top-4 right-4">
        <button onClick={()=>setLang(lang==="ar"?"en":"ar")} className="bg-white/20 hover:bg-white/30 text-white text-sm font-bold px-4 py-2 rounded-full backdrop-blur-sm transition">🌐 {t.switchLang}</button>
      </div>
      <div className="bg-white rounded-2xl shadow-2xl p-8 w-full max-w-md">
        <div className="text-center mb-8">
          <div className="w-16 h-16 bg-orange-500 rounded-2xl flex items-center justify-center mx-auto mb-4 text-3xl">🔗</div>
          <h1 className="text-2xl font-extrabold text-slate-800">{t.loginTitle}</h1>
          <p className="text-slate-500 text-sm mt-2">{t.loginSub}</p>
        </div>
        <form onSubmit={submit} className="space-y-4">
          <div>
            <label className="block text-xs font-bold text-slate-600 mb-1">{t.pwLabel}</label>
            <input type="password" value={pw} onChange={e=>setPw(e.target.value)} placeholder={t.pwPh} dir="ltr"
              className={`w-full px-4 py-3 border-2 rounded-xl text-sm focus:outline-none transition ${err?"border-red-400 bg-red-50":"border-slate-200 focus:border-orange-500"}`}/>
            {err && <p className="text-red-500 text-xs mt-1 font-semibold">{t.wrongPw}</p>}
          </div>
          <button type="submit" className="w-full bg-orange-500 hover:bg-orange-400 text-white font-bold py-3 rounded-xl text-sm transition shadow-md">{t.loginBtn}</button>
        </form>
      </div>
    </div>
  );
}

/* ── Toast ── */
function Toast({ n, onClose }) {
  if(!n) return null;
  const cls={success:"bg-emerald-50 border-emerald-200 text-emerald-800",warning:"bg-amber-50 border-amber-200 text-amber-800",error:"bg-rose-50 border-rose-200 text-rose-800"}[n.type];
  return (
    <div className={`fixed top-4 left-4 right-4 md:left-auto md:w-96 z-50 p-4 rounded-xl shadow-lg border flex items-center gap-3 ${cls}`}>
      <div className="flex-1 text-sm font-semibold">{n.message}</div>
      <button onClick={onClose} className="text-slate-400 hover:text-slate-600 font-bold text-lg leading-none">×</button>
    </div>
  );
}

/* ── Card ── */
function FilterCard({ filter, onCopy, t }) {
  const dateStr = filter.createdAt ? new Date(filter.createdAt).toLocaleDateString(t.lang==="ar"?"ar-EG":"en-US",{month:"short",day:"numeric"}) : t.recentlyAdded;
  return (
    <div className="bg-white rounded-2xl overflow-hidden shadow-sm hover:shadow-md border border-slate-100 transition-all duration-200 flex flex-col group">
      <div className="relative h-48 bg-slate-100 overflow-hidden">
        <img src={filter.imageUrl||DEF_IMAGE} alt={filter.title} className="w-full h-full object-cover group-hover:scale-105 transition-transform duration-300"
          onError={e=>{e.target.onerror=null;e.target.src=DEF_IMAGE;}}/>
        <div className="absolute top-3 right-3">
          <span className="bg-orange-500 text-white text-[10px] px-2.5 py-1 rounded-full font-bold shadow-sm">HubSpot • Sales</span>
        </div>
      </div>
      <div className="p-5 flex-1 flex flex-col justify-between">
        <div>
          <h3 className="text-lg font-bold text-slate-800 line-clamp-1 mb-2 group-hover:text-orange-500 transition-colors">{filter.title}</h3>
          <p className="text-slate-500 text-sm line-clamp-3 mb-4 leading-relaxed">{filter.description}</p>
        </div>
        <div className="pt-4 border-t border-slate-100 space-y-3">
          <div className="flex justify-between items-center text-[11px] text-slate-400">
            <span>{t.by}: <strong className="text-slate-600">{filter.createdBy||t.unknown}</strong></span>
            <span>{dateStr}</span>
          </div>
          <div className="flex gap-2">
            <a href={filter.crmUrl} target="_blank" rel="noopener noreferrer"
              className="flex-1 bg-orange-50 hover:bg-orange-100 text-orange-700 font-bold py-2.5 px-3 rounded-xl text-xs transition flex items-center justify-center gap-1.5">
              <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"/></svg>
              {t.goToFilter}
            </a>
            <button onClick={()=>onCopy(filter.crmUrl)} className="bg-slate-100 hover:bg-slate-200 text-slate-600 font-bold py-2.5 px-3 rounded-xl text-xs transition flex items-center justify-center gap-1.5">
              <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M8 5H6a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2v-1M8 5a2 2 0 002 2h2a2 2 0 002-2M8 5a2 2 0 012-2h2a2 2 0 012 2m0 0h2a2 2 0 012 2v3m2 4H10m0 0l3-3m-3 3l3 3"/></svg>
              {t.copyLink}
            </button>
          </div>
        </div>
      </div>
    </div>
  );
}

/* ── Modal ── */
function AddModal({ onClose, onAdd, showNotif, t }) {
  const [title,setTitle]=useState("");
  const [crmUrl,setCrmUrl]=useState("");
  const [desc,setDesc]=useState("");
  const [imgType,setImgType]=useState("auto");
  const [imgUrl,setImgUrl]=useState("");
  const [imgPreview,setImgPreview]=useState(null);
  const [imgBase64,setImgBase64]=useState(null);
  const [sub,setSub]=useState(false);
  const fileRef=useRef(null);

  const handleFileChange = e => {
    const file = e.target.files[0];
    if(!file) return;
    if(file.size > 2*1024*1024) { showNotif("warning", t.lang==="ar"?"الصورة أكبر من 2MB، اختر صورة أصغر.":"Image is larger than 2MB, please choose a smaller one."); return; }
    const reader = new FileReader();
    reader.onload = ev => { setImgBase64(ev.target.result); setImgPreview(ev.target.result); };
    reader.readAsDataURL(file);
  };

  const submit = async e => {
    e.preventDefault();
    if(!title.trim()||!crmUrl.trim()||!desc.trim()){showNotif("warning",t.fillAll);return;}
    setSub(true);
    let finalImg = DEF_IMAGE;
    if(imgType==="upload" && imgBase64) finalImg = imgBase64;
    else if(imgType==="url" && imgUrl.trim()) finalImg = imgUrl.trim();
    await onAdd({id:`f-${Date.now()}`,title:title.trim(),crmUrl:crmUrl.trim(),description:desc.trim(),imageUrl:finalImg,createdBy:t.me,createdAt:new Date().toISOString()});
    setSub(false); onClose();
  };

  return (
    <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 flex items-center justify-center p-4" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="bg-white rounded-2xl w-full max-w-2xl max-h-[90vh] overflow-y-auto shadow-2xl border border-slate-100">
        <div className="px-6 py-4 border-b border-slate-100 flex justify-between items-center sticky top-0 bg-white z-10">
          <div className="flex items-center gap-2">
            <span className="p-2 bg-orange-50 text-orange-500 rounded-lg text-lg">🔗</span>
            <h2 className="text-xl font-bold text-slate-800">{t.modalTitle}</h2>
          </div>
          <button onClick={onClose} className="p-1 rounded-full hover:bg-slate-100 text-slate-400 hover:text-slate-600 transition">
            <svg className="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M6 18L18 6M6 6l12 12"/></svg>
          </button>
        </div>
        <form onSubmit={submit} className="p-6 space-y-5">

          {/* Filter name */}
          <div>
            <label className="block text-xs font-bold text-slate-600 mb-1">{t.filterName}</label>
            <input type="text" required value={title} onChange={e=>setTitle(e.target.value)} placeholder={t.filterNamePh}
              className="w-full px-4 py-2.5 border border-slate-200 rounded-xl text-sm focus:ring-2 focus:ring-orange-400 focus:outline-none"/>
          </div>

          {/* CRM link */}
          <div>
            <label className="block text-xs font-bold text-slate-600 mb-1">{t.filterLink}</label>
            <input type="url" required value={crmUrl} onChange={e=>setCrmUrl(e.target.value)} placeholder="https://app.hubspot.com/..." dir="ltr"
              className="w-full px-4 py-2.5 border border-slate-200 rounded-xl text-sm text-left focus:ring-2 focus:ring-orange-400 focus:outline-none"/>
          </div>

          {/* Description */}
          <div>
            <label className="block text-xs font-bold text-slate-600 mb-1">{t.detailedDesc}</label>
            <textarea rows="3" required value={desc} onChange={e=>setDesc(e.target.value)} placeholder={t.descPh}
              className="w-full px-4 py-2.5 border border-slate-200 rounded-xl text-sm focus:ring-2 focus:ring-orange-400 focus:outline-none leading-relaxed"/>
          </div>

          {/* Image section */}
          <div className="border-t border-slate-100 pt-4">
            <label className="block text-xs font-bold text-slate-700 mb-2">{t.imageSection}</label>
            <div className="grid grid-cols-3 gap-2 mb-3">
              {[{k:"upload",l:t.imageUpload},{k:"url",l:t.imageUrl},{k:"auto",l:t.imageAuto}].map(({k,l})=>(
                <button key={k} type="button" onClick={()=>{setImgType(k);setImgPreview(null);setImgBase64(null);setImgUrl("");}}
                  className={`p-2.5 rounded-xl border text-xs font-semibold transition text-center ${imgType===k?"border-orange-400 bg-orange-50 text-orange-700":"border-slate-200 hover:bg-slate-50"}`}>{l}</button>
              ))}
            </div>

            {/* Upload from device */}
            {imgType==="upload" && (
              <div>
                <div onClick={()=>fileRef.current?.click()}
                  className="w-full border-2 border-dashed border-slate-200 hover:border-orange-400 rounded-xl p-6 text-center cursor-pointer transition">
                  {imgPreview ? (
                    <img src={imgPreview} alt="preview" className="max-h-40 mx-auto rounded-lg object-cover"/>
                  ) : (
                    <div>
                      <div className="text-3xl mb-2">📁</div>
                      <p className="text-sm text-slate-500 font-medium">{t.chooseFile}</p>
                      <p className="text-xs text-slate-400 mt-1">{t.lang==="ar"?"الحد الأقصى 2MB":"Max 2MB"}</p>
                    </div>
                  )}
                </div>
                <input ref={fileRef} type="file" accept="image/*" className="hidden" onChange={handleFileChange}/>
                {imgPreview && (
                  <button type="button" onClick={()=>{setImgPreview(null);setImgBase64(null);fileRef.current.value="";}}
                    className="mt-2 text-xs text-red-500 hover:text-red-700 font-semibold">{t.lang==="ar"?"✕ إزالة الصورة":"✕ Remove image"}</button>
                )}
              </div>
            )}

            {/* URL */}
            {imgType==="url" && (
              <div>
                <input type="url" value={imgUrl} onChange={e=>setImgUrl(e.target.value)} placeholder="https://example.com/image.jpg" dir="ltr"
                  className="w-full px-4 py-2.5 border border-slate-200 rounded-xl text-xs text-left focus:ring-2 focus:ring-orange-400 focus:outline-none"/>
                {imgUrl && <img src={imgUrl} alt="preview" className="mt-2 max-h-32 rounded-lg object-cover border border-slate-200" onError={e=>e.target.style.display="none"}/>}
              </div>
            )}

            {/* Auto */}
            {imgType==="auto" && (
              <p className="text-xs text-emerald-600 bg-emerald-50 p-3 rounded-lg border border-emerald-100">{t.imageAutoMsg}</p>
            )}
          </div>

          <div className="flex gap-3 pt-4 border-t border-slate-100">
            <button type="submit" disabled={sub} className="flex-1 bg-orange-500 hover:bg-orange-400 disabled:bg-slate-300 text-white font-bold py-3 px-4 rounded-xl text-sm transition shadow-md">
              {sub?t.savingBtn:t.publishBtn}
            </button>
            <button type="button" onClick={onClose} className="bg-slate-100 hover:bg-slate-200 text-slate-600 font-bold py-3 px-5 rounded-xl text-sm transition">{t.cancelBtn}</button>
          </div>
        </form>
      </div>
    </div>
  );
}

/* ── Main App ── */
function App() {
  const [lang,setLang]=useState("ar");
  const [authed,setAuthed]=useState(false);
  const [filters,setFilters]=useState([]);
  const [loading,setLoading]=useState(true);
  const [search,setSearch]=useState("");
  const [modalOpen,setModalOpen]=useState(false);
  const [notif,setNotif]=useState(null);
  const timer=useRef(null);
  const t=T[lang];

  const showNotif=(type,message)=>{setNotif({type,message});clearTimeout(timer.current);timer.current=setTimeout(()=>setNotif(null),4000);};

  useEffect(()=>{
    if(sessionStorage.getItem(AUTH_KEY)==="1") setAuthed(true);
    try { const raw=localStorage.getItem(STORAGE_KEY); const data=raw?JSON.parse(raw):null; setFilters(Array.isArray(data)&&data.length?data:SAMPLES); } catch { setFilters(SAMPLES); }
    setLoading(false);
  },[]);

  const handleLogin=()=>{ setAuthed(true); sessionStorage.setItem(AUTH_KEY,"1"); };
  const save=list=>{try{localStorage.setItem(STORAGE_KEY,JSON.stringify(list));}catch{}};
  const handleAdd=f=>{const updated=[f,...filters];setFilters(updated);save(updated);showNotif("success",t.published);};
  const copyToClipboard=text=>{
    navigator.clipboard?.writeText(text).then(()=>showNotif("success",t.copied)).catch(()=>{
      const ta=document.createElement("textarea");ta.value=text;document.body.appendChild(ta);ta.select();document.execCommand("copy");document.body.removeChild(ta);showNotif("success",t.copied);
    });
  };

  const filtered=filters.filter(f=>{
    const q=search.toLowerCase();
    return f.title?.toLowerCase().includes(q)||f.description?.toLowerCase().includes(q);
  });

  if(!authed) return <LoginScreen onLogin={handleLogin} lang={lang} setLang={setLang}/>;

  return (
    <div className="min-h-screen bg-slate-50 text-slate-800 pb-16" dir={t.dir}>
      <Toast n={notif} onClose={()=>setNotif(null)}/>

      {/* Header */}
      <header className="bg-gradient-to-r from-orange-500 via-orange-600 to-red-600 text-white shadow-md relative overflow-hidden">
        <div className="absolute inset-0 opacity-10" style={{backgroundImage:"radial-gradient(#fff 1px,transparent 1px)",backgroundSize:"16px 16px"}}></div>
        <div className="max-w-7xl mx-auto px-4 py-8 sm:py-12 relative z-10">
          <div className="flex flex-col md:flex-row justify-between items-start md:items-center gap-6">
            <div>
              <div className="flex items-center gap-3 mb-2">
                <span className="inline-block bg-white/20 text-white text-xs px-3 py-1 rounded-full font-mono backdrop-blur-sm">{t.badge}</span>
                <button onClick={()=>setLang(lang==="ar"?"en":"ar")} className="bg-white/20 hover:bg-white/30 text-white text-xs font-bold px-3 py-1 rounded-full backdrop-blur-sm transition">🌐 {t.switchLang}</button>
              </div>
              <h1 className="text-3xl sm:text-4xl font-extrabold tracking-tight">{t.appName}</h1>
              <p className="mt-2 text-orange-100 max-w-2xl text-sm sm:text-base">{t.subtitle}</p>
            </div>
            <button onClick={()=>setModalOpen(true)} className="bg-white text-orange-600 hover:bg-orange-50 font-bold px-6 py-3.5 rounded-xl transition shadow-md hover:shadow-lg flex items-center gap-2 text-sm whitespace-nowrap">
              <svg className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 4v16m8-8H4"/></svg>
              {t.addBtn}
            </button>
          </div>
          <div className="mt-8">
            <div className="bg-white/10 backdrop-blur-sm rounded-xl p-4 text-center inline-block min-w-32">
              <div className="text-3xl font-extrabold">{filters.length}</div>
              <div className="text-orange-100 text-sm mt-1">{t.totalFilters}</div>
            </div>
          </div>
        </div>
      </header>

      {/* Search bar */}
      <div className="bg-white border-b border-slate-200 sticky top-0 z-30 shadow-sm">
        <div className="max-w-7xl mx-auto px-4 py-4">
          <div className="relative">
            <svg className={`absolute ${t.dir==="rtl"?"right-3":"left-3"} top-1/2 -translate-y-1/2 w-4 h-4 text-slate-400`} fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
            </svg>
            <input type="text" placeholder={t.searchPlaceholder} value={search} onChange={e=>setSearch(e.target.value)}
              className={`w-full ${t.dir==="rtl"?"pr-10 pl-4":"pl-10 pr-4"} py-2.5 border border-slate-200 rounded-xl text-sm focus:ring-2 focus:ring-orange-400 focus:outline-none`}/>
          </div>
        </div>
      </div>

      {/* Content */}
      <main className="max-w-7xl mx-auto px-4 py-8">
        {loading ? (
          <div className="flex flex-col items-center justify-center py-24 text-slate-500">
            <svg className="animate-spin h-10 w-10 text-orange-500 mb-4" viewBox="0 0 24 24" fill="none">
              <circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4"/>
              <path className="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/>
            </svg>
            <p className="text-sm font-semibold">{t.loading}</p>
          </div>
        ) : filtered.length===0 ? (
          <div className="bg-white rounded-2xl p-12 text-center border border-slate-100 shadow-sm">
            <div className="text-4xl mb-4">🔍</div>
            <h3 className="text-lg font-bold text-slate-700 mb-1">{t.noResults}</h3>
            <p className="text-slate-400 text-sm">{t.noResultsSub}</p>
          </div>
        ) : (
          <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            {filtered.map(f=><FilterCard key={f.id} filter={f} onCopy={copyToClipboard} t={t}/>)}
          </div>
        )}
      </main>

      {modalOpen && <AddModal onClose={()=>setModalOpen(false)} onAdd={handleAdd} showNotif={showNotif} t={t}/>}

      <footer className="text-center py-10 text-xs text-slate-400 border-t border-slate-200 bg-white mt-8">
        <p className="font-semibold text-slate-600 mb-1">{t.footerTitle}</p>
        <p>{t.footerSub}</p>
      </footer>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
