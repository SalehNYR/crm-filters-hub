<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>مدونة فلاتر الـ CRM</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
    .line-clamp-1 { display: -webkit-box; -webkit-line-clamp: 1; -webkit-box-orient: vertical; overflow: hidden; }
    .line-clamp-3 { display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
  </style>
</head>
<body class="bg-slate-50">
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef } = React;

const CATEGORIES = ["الكل", "مبيعات", "تسويق", "دعم عملاء", "أخرى"];
const PLATFORMS  = ["الكل", "HubSpot", "Salesforce", "Zoho", "Pipedrive", "Bitrix24", "أخرى"];

const CATEGORY_COLORS = {
  "مبيعات":    "bg-orange-500",
  "تسويق":     "bg-indigo-500",
  "دعم عملاء": "bg-teal-500",
  "أخرى":      "bg-slate-500",
};

const DEFAULT_IMAGES = {
  "مبيعات":    "https://images.unsplash.com/photo-1460925895917-afdab827c52f?auto=format&fit=crop&w=800&q=80",
  "تسويق":     "https://images.unsplash.com/photo-1551288049-bebda4e38f71?auto=format&fit=crop&w=800&q=80",
  "دعم عملاء": "https://images.unsplash.com/photo-1516321318423-f06f85e504b3?auto=format&fit=crop&w=800&q=80",
  "أخرى":      "https://images.unsplash.com/photo-1551288049-bebda4e38f71?auto=format&fit=crop&w=800&q=80",
};

const STORAGE_KEY = "crm_filters_hub_v1";

const SAMPLES = [
  {
    id: "sample-1",
    title: "العملاء المهتمين جداً دون تواصل منذ 3 أيام",
    crmUrl: "https://app.hubspot.com/contacts/sample-filter-id-1",
    description: "يظهر هذا الفلتر جميع العملاء المحتملين المصنفين كـ 'مهتم جداً' والذين لم يتم إرسال إيميل أو إجراء مكالمة معهم في آخر 3 أيام لسرعة المتابعة.",
    category: "مبيعات", platform: "HubSpot",
    imageUrl: DEFAULT_IMAGES["مبيعات"],
    createdBy: "النظام", createdAt: new Date().toISOString(),
  },
  {
    id: "sample-2",
    title: "مشتركو النشرات البريدية غير النشطين للتنشيط",
    crmUrl: "https://login.salesforce.com/sample-filter-id-2",
    description: "قائمة تضم كافة المشتركين في النشرة الإخبارية خلال الـ 6 أشهر الماضية ولكن لم يفتحوا أي بريد إلكتروني، لاستخدامها في حملة إعادة التنشيط التسويقية.",
    category: "تسويق", platform: "Salesforce",
    imageUrl: DEFAULT_IMAGES["تسويق"],
    createdBy: "النظام", createdAt: new Date().toISOString(),
  },
];

/* ───── Toast ───── */
function Toast({ n, onClose }) {
  if (!n) return null;
  const cls = {
    success: "bg-emerald-50 border-emerald-200 text-emerald-800",
    warning: "bg-amber-50  border-amber-200  text-amber-800",
    error:   "bg-rose-50   border-rose-200   text-rose-800",
  }[n.type];
  return (
    <div className={`fixed top-4 left-4 right-4 md:left-auto md:w-96 z-50 p-4 rounded-xl shadow-lg border flex items-center gap-3 ${cls}`}>
      <div className="flex-1 text-sm font-semibold">{n.message}</div>
      <button onClick={onClose} className="text-slate-400 hover:text-slate-600 font-bold text-lg leading-none">×</button>
    </div>
  );
}

/* ───── Card ───── */
function FilterCard({ filter, onCopy }) {
  const catColor = CATEGORY_COLORS[filter.category] || "bg-slate-500";
  const dateStr  = filter.createdAt
    ? new Date(filter.createdAt).toLocaleDateString("ar-EG", { month: "short", day: "numeric" })
    : "مضاف حديثاً";

  return (
    <div className="bg-white rounded-2xl overflow-hidden shadow-sm hover:shadow-md border border-slate-100 transition-all duration-200 flex flex-col group">
      <div className="relative h-48 bg-slate-100 overflow-hidden">
        <img src={filter.imageUrl} alt={filter.title}
          className="w-full h-full object-cover group-hover:scale-105 transition-transform duration-300"
          onError={e => { e.target.onerror = null; e.target.src = DEFAULT_IMAGES["أخرى"]; }} />
        <div className="absolute top-3 right-3 flex gap-2">
          <span className="bg-slate-900/80 text-white text-[10px] px-2.5 py-1 rounded-full font-bold backdrop-blur-sm">{filter.platform}</span>
          <span className={`text-[10px] px-2.5 py-1 rounded-full font-bold text-white ${catColor}`}>{filter.category}</span>
        </div>
      </div>
      <div className="p-5 flex-1 flex flex-col justify-between">
        <div>
          <h3 className="text-lg font-bold text-slate-800 line-clamp-1 mb-2 group-hover:text-blue-600 transition-colors">{filter.title}</h3>
          <p className="text-slate-500 text-sm line-clamp-3 mb-4 leading-relaxed">{filter.description}</p>
        </div>
        <div className="pt-4 border-t border-slate-100 space-y-3">
          <div className="flex justify-between items-center text-[11px] text-slate-400">
            <span>بواسطة: <strong className="text-slate-600">{filter.createdBy || "مجهول"}</strong></span>
            <span>{dateStr}</span>
          </div>
          <div className="flex gap-2">
            <a href={filter.crmUrl} target="_blank" rel="noopener noreferrer"
              className="flex-1 bg-blue-50 hover:bg-blue-100 text-blue-700 font-bold py-2.5 px-3 rounded-xl text-xs transition flex items-center justify-center gap-1.5">
              <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14" />
              </svg>
              الانتقال للفلتر
            </a>
            <button onClick={() => onCopy(filter.crmUrl)}
              className="bg-slate-100 hover:bg-slate-200 text-slate-600 font-bold py-2.5 px-3 rounded-xl text-xs transition flex items-center justify-center gap-1.5">
              <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M8 5H6a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2v-1M8 5a2 2 0 002 2h2a2 2 0 002-2M8 5a2 2 0 012-2h2a2 2 0 012 2m0 0h2a2 2 0 012 2v3m2 4H10m0 0l3-3m-3 3l3 3" />
              </svg>
              نسخ الرابط
            </button>
          </div>
        </div>
      </div>
    </div>
  );
}

/* ───── Modal ───── */
function AddModal({ onClose, onAdd, showNotif }) {
  const [title, setTitle]       = useState("");
  const [crmUrl, setCrmUrl]     = useState("");
  const [desc, setDesc]         = useState("");
  const [category, setCategory] = useState("مبيعات");
  const [platform, setPlatform] = useState("HubSpot");
  const [imgType, setImgType]   = useState("default");
  const [imgUrl, setImgUrl]     = useState("");
  const [submitting, setSub]    = useState(false);

  const submit = async e => {
    e.preventDefault();
    if (!title.trim() || !crmUrl.trim() || !desc.trim()) {
      showNotif("warning", "يرجى تعبئة كافة الحقول الأساسية.");
      return;
    }
    setSub(true);
    const finalImg = (imgType === "url" && imgUrl.trim()) ? imgUrl.trim() : (DEFAULT_IMAGES[category] || DEFAULT_IMAGES["أخرى"]);
    await onAdd({
      id: `filter-${Date.now()}`,
      title: title.trim(), crmUrl: crmUrl.trim(), description: desc.trim(),
      category, platform, imageUrl: finalImg,
      createdBy: "أنت", createdAt: new Date().toISOString(),
    });
    setSub(false);
    onClose();
  };

  return (
    <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 flex items-center justify-center p-4" onClick={e => e.target === e.currentTarget && onClose()}>
      <div className="bg-white rounded-2xl w-full max-w-2xl max-h-[90vh] overflow-y-auto shadow-2xl border border-slate-100">
        {/* Header */}
        <div className="px-6 py-4 border-b border-slate-100 flex justify-between items-center sticky top-0 bg-white z-10">
          <div className="flex items-center gap-2">
            <span className="p-2 bg-blue-50 text-blue-600 rounded-lg text-lg">🔗</span>
            <h2 className="text-xl font-bold text-slate-800">مشاركة فلتر CRM جديد</h2>
          </div>
          <button onClick={onClose} className="p-1 rounded-full hover:bg-slate-100 text-slate-400 hover:text-slate-600 transition">
            <svg className="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M6 18L18 6M6 6l12 12" />
            </svg>
          </button>
        </div>
        {/* Form */}
        <form onSubmit={submit} className="p-6 space-y-5">
          <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
            <div>
              <label className="block text-xs font-bold text-slate-600 mb-1">اسم الفلتر *</label>
              <input type="text" required value={title} onChange={e => setTitle(e.target.value)} placeholder="مثال: مبيعات كبار العملاء المفتوحة"
                className="w-full px-4 py-2.5 border border-slate-200 rounded-xl text-sm focus:ring-2 focus:ring-blue-500 focus:outline-none" />
            </div>
            <div>
              <label className="block text-xs font-bold text-slate-600 mb-1">نظام الـ CRM *</label>
              <select value={platform} onChange={e => setPlatform(e.target.value)}
                className="w-full px-4 py-2.5 border border-slate-200 rounded-xl text-sm focus:ring-2 focus:ring-blue-500 focus:outline-none bg-white">
                {["HubSpot","Salesforce","Zoho","Pipedrive","Bitrix24","أخرى"].map(p => <option key={p}>{p}</option>)}
              </select>
            </div>
          </div>

          <div>
            <label className="block text-xs font-bold text-slate-600 mb-1">رابط الفلتر المباشر *</label>
            <input type="url" required value={crmUrl} onChange={e => setCrmUrl(e.target.value)} placeholder="https://..." dir="ltr"
              className="w-full px-4 py-2.5 border border-slate-200 rounded-xl text-sm text-left focus:ring-2 focus:ring-blue-500 focus:outline-none" />
          </div>

          <div>
            <label className="block text-xs font-bold text-slate-600 mb-1">القسم المستهدف *</label>
            <select value={category} onChange={e => setCategory(e.target.value)}
              className="w-full px-4 py-2.5 border border-slate-200 rounded-xl text-sm focus:ring-2 focus:ring-blue-500 focus:outline-none bg-white">
              <option value="مبيعات">المبيعات (Sales)</option>
              <option value="تسويق">التسويق (Marketing)</option>
              <option value="دعم عملاء">خدمة العملاء (Support)</option>
              <option value="أخرى">أخرى</option>
            </select>
          </div>

          <div>
            <label className="block text-xs font-bold text-slate-600 mb-1">وصف تفصيلي *</label>
            <textarea rows="3" required value={desc} onChange={e => setDesc(e.target.value)}
              placeholder="اشرح ماذا يظهر هذا الفلتر تحديداً وكيف يُستخدم..."
              className="w-full px-4 py-2.5 border border-slate-200 rounded-xl text-sm focus:ring-2 focus:ring-blue-500 focus:outline-none leading-relaxed" />
          </div>

          <div className="border-t border-slate-100 pt-4">
            <label className="block text-xs font-bold text-slate-700 mb-2">الصورة التوضيحية</label>
            <div className="grid grid-cols-2 gap-2 mb-3">
              {[{k:"url",l:"🔗 رابط صورة مباشر"},{k:"default",l:"🖼️ صورة تلقائية"}].map(({k,l}) => (
                <button key={k} type="button" onClick={() => setImgType(k)}
                  className={`p-2.5 rounded-xl border text-xs font-semibold transition ${imgType===k?"border-blue-500 bg-blue-50 text-blue-700":"border-slate-200 hover:bg-slate-50"}`}>{l}</button>
              ))}
            </div>
            {imgType === "url" && (
              <input type="url" value={imgUrl} onChange={e => setImgUrl(e.target.value)} placeholder="https://example.com/image.jpg" dir="ltr"
                className="w-full px-4 py-2.5 border border-slate-200 rounded-xl text-xs text-left focus:ring-2 focus:ring-blue-500 focus:outline-none" />
            )}
            {imgType === "default" && (
              <p className="text-xs text-emerald-600 bg-emerald-50 p-3 rounded-lg border border-emerald-100">سيتم اختيار صورة تلقائية تناسب القسم المختار.</p>
            )}
          </div>

          <div className="flex gap-3 pt-4 border-t border-slate-100">
            <button type="submit" disabled={submitting}
              className="flex-1 bg-emerald-500 hover:bg-emerald-400 disabled:bg-slate-300 text-white font-bold py-3 px-4 rounded-xl text-sm transition shadow-md">
              {submitting ? "جاري الحفظ..." : "انشر وشارك مع زملائك ✨"}
            </button>
            <button type="button" onClick={onClose}
              className="bg-slate-100 hover:bg-slate-200 text-slate-600 font-bold py-3 px-5 rounded-xl text-sm transition">إلغاء</button>
          </div>
        </form>
      </div>
    </div>
  );
}

/* ───── Main App ───── */
function App() {
  const [filters, setFilters]         = useState([]);
  const [loading, setLoading]         = useState(true);
  const [search, setSearch]           = useState("");
  const [selCat, setSelCat]           = useState("الكل");
  const [selPlat, setSelPlat]         = useState("الكل");
  const [modalOpen, setModalOpen]     = useState(false);
  const [notif, setNotif]             = useState(null);
  const timer = useRef(null);

  const showNotif = (type, message) => {
    setNotif({ type, message });
    clearTimeout(timer.current);
    timer.current = setTimeout(() => setNotif(null), 4000);
  };

  // Load from localStorage
  useEffect(() => {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      const data = raw ? JSON.parse(raw) : null;
      setFilters(Array.isArray(data) && data.length ? data : SAMPLES);
    } catch {
      setFilters(SAMPLES);
    }
    setLoading(false);
  }, []);

  const save = (list) => {
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(list)); } catch {}
  };

  const handleAdd = (newFilter) => {
    const updated = [newFilter, ...filters];
    setFilters(updated);
    save(updated);
    showNotif("success", "تم نشر الفلتر بنجاح! 🎉");
  };

  const copyToClipboard = (text) => {
    navigator.clipboard?.writeText(text).then(() => {
      showNotif("success", "تم نسخ رابط الفلتر!");
    }).catch(() => {
      const ta = document.createElement("textarea");
      ta.value = text; document.body.appendChild(ta); ta.select();
      document.execCommand("copy"); document.body.removeChild(ta);
      showNotif("success", "تم نسخ رابط الفلتر!");
    });
  };

  const filtered = filters.filter(f => {
    const q = search.toLowerCase();
    return (f.title?.toLowerCase().includes(q) || f.description?.toLowerCase().includes(q))
      && (selCat  === "الكل" || f.category === selCat)
      && (selPlat === "الكل" || f.platform === selPlat);
  });

  return (
    <div className="min-h-screen bg-slate-50 text-slate-800 pb-16" dir="rtl">
      <Toast n={notif} onClose={() => setNotif(null)} />

      {/* Header */}
      <header className="bg-gradient-to-r from-blue-700 via-indigo-700 to-indigo-800 text-white shadow-md relative overflow-hidden">
        <div className="absolute inset-0 opacity-10" style={{backgroundImage:"radial-gradient(#fff 1px,transparent 1px)",backgroundSize:"16px 16px"}}></div>
        <div className="max-w-7xl mx-auto px-4 py-8 sm:py-12 relative z-10">
          <div className="flex flex-col md:flex-row justify-between items-start md:items-center gap-6">
            <div>
              <span className="inline-block bg-white/20 text-white text-xs px-3 py-1 rounded-full font-mono backdrop-blur-sm mb-2">مشاركة الفلاتر 🔗</span>
              <h1 className="text-3xl sm:text-4xl font-extrabold tracking-tight">مدونة فلاتر الـ CRM</h1>
              <p className="mt-2 text-blue-100 max-w-2xl text-sm sm:text-base">
                مساحة عمل مشتركة لإضافة فلاتر CRM وتوضيح استخداماتها لتسهيل العمل اليومي للفريق.
              </p>
            </div>
            <button onClick={() => setModalOpen(true)}
              className="bg-emerald-500 hover:bg-emerald-400 text-white font-bold px-6 py-3.5 rounded-xl transition shadow-md hover:shadow-lg flex items-center gap-2 text-sm whitespace-nowrap">
              <svg className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 4v16m8-8H4" />
              </svg>
              مشاركة فلتر جديد
            </button>
          </div>
          {/* Stats */}
          <div className="grid grid-cols-3 gap-4 mt-8 text-center">
            {[
              {label:"إجمالي الفلاتر",  value: filters.length},
              {label:"فلاتر مبيعات",    value: filters.filter(f=>f.category==="مبيعات").length},
              {label:"فلاتر تسويق",     value: filters.filter(f=>f.category==="تسويق").length},
            ].map(({label,value}) => (
              <div key={label} className="bg-white/10 backdrop-blur-sm rounded-xl p-3 sm:p-4">
                <div className="text-2xl sm:text-3xl font-extrabold">{value}</div>
                <div className="text-blue-200 text-xs sm:text-sm mt-1">{label}</div>
              </div>
            ))}
          </div>
        </div>
      </header>

      {/* Search & Filter bar */}
      <div className="bg-white border-b border-slate-200 sticky top-0 z-30 shadow-sm">
        <div className="max-w-7xl mx-auto px-4 py-4 flex flex-col sm:flex-row gap-3 items-center">
          <div className="relative flex-1 w-full">
            <svg className="absolute right-3 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
            </svg>
            <input type="text" placeholder="ابحث في الفلاتر..." value={search} onChange={e => setSearch(e.target.value)}
              className="w-full pr-10 pl-4 py-2.5 border border-slate-200 rounded-xl text-sm focus:ring-2 focus:ring-blue-500 focus:outline-none" />
          </div>
          <div className="flex gap-2 w-full sm:w-auto">
            <select value={selCat} onChange={e => setSelCat(e.target.value)}
              className="flex-1 sm:flex-none px-3 py-2.5 border border-slate-200 rounded-xl text-sm focus:ring-2 focus:ring-blue-500 focus:outline-none bg-white">
              {CATEGORIES.map(c => <option key={c}>{c}</option>)}
            </select>
            <select value={selPlat} onChange={e => setSelPlat(e.target.value)}
              className="flex-1 sm:flex-none px-3 py-2.5 border border-slate-200 rounded-xl text-sm focus:ring-2 focus:ring-blue-500 focus:outline-none bg-white">
              {PLATFORMS.map(p => <option key={p}>{p}</option>)}
            </select>
          </div>
        </div>
      </div>

      {/* Content */}
      <main className="max-w-7xl mx-auto px-4 py-8">
        {loading ? (
          <div className="flex flex-col items-center justify-center py-24 text-slate-500">
            <svg className="animate-spin h-10 w-10 text-blue-600 mb-4" viewBox="0 0 24 24" fill="none">
              <circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4"/>
              <path className="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/>
            </svg>
            <p className="text-sm font-semibold">جاري التحميل...</p>
          </div>
        ) : filtered.length === 0 ? (
          <div className="bg-white rounded-2xl p-12 text-center border border-slate-100 shadow-sm">
            <div className="text-4xl mb-4">🔍</div>
            <h3 className="text-lg font-bold text-slate-700 mb-1">لم نعثر على أي فلاتر مطابقة</h3>
            <p className="text-slate-400 text-sm">جرب تغيير كلمات البحث أو أضف فلتراً جديداً.</p>
          </div>
        ) : (
          <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            {filtered.map(f => <FilterCard key={f.id} filter={f} onCopy={copyToClipboard} />)}
          </div>
        )}
      </main>

      {modalOpen && <AddModal onClose={() => setModalOpen(false)} onAdd={handleAdd} showNotif={showNotif} />}

      <footer className="text-center py-10 text-xs text-slate-400 border-t border-slate-200 bg-white mt-8">
        <p className="font-semibold text-slate-600 mb-1">مدونة فلاتر الـ CRM 🚀</p>
        <p>البيانات محفوظة على جهازك — أي فلتر تضيفه يظهر في كل مرة تفتح الصفحة.</p>
      </footer>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
